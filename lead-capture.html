<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Project Estimate | Nile Gazer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .form-container {
            max-width: 700px;
            margin: 2rem auto;
            background: white;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e0;
            border-radius: 12px;
            font-size: 1rem;
        }
        button {
            background: #0a0a0a;
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
        }
        .status {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 12px;
        }
        .success {
            background: #e6fffa;
            color: #234e52;
        }
        .error {
            background: #fff5f5;
            color: #c53030;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">Nile Gazer</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="lead-capture.html">Free Estimate</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="form-container">
            <h1>Free Project Estimate</h1>
            <p>Tell me about your project and I'll send a detailed quote within 24 hours.</p>
            <form id="estimate-form" action="https://api.web3forms.com/submit" method="POST">
                <!-- REPLACE WITH YOUR ACTUAL WEB3FORMS ACCESS KEY -->
                <input type="hidden" name="access_key" value="742eb613-962d-4f77-800d-b9033f5e204a">
                <input type="hidden" name="subject" value="New Project Estimate Request from NileGazer00.github.io">
                <input type="hidden" name="redirect" value="https://nilegazer00.github.io/thanks.html">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Project Type *</label>
                    <select name="project_type" required>
                        <option value="">Select...</option>
                        <option>Website from scratch</option>
                        <option>Web app / SaaS</option>
                        <option>E-commerce</option>
                        <option>Redesign / Migration</option>
                        <option>API / Backend</option>
                        <option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Budget Range (optional)</label>
                    <select name="budget">
                        <option value="">Prefer not to say</option>
                        <option> - </option>
                        <option> - </option>
                        <option> - </option>
                        <option>+</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Project Description *</label>
                    <textarea name="message" rows="5" placeholder="What are you building? What features are essential? Any timeline constraints?" required></textarea>
                </div>
                <button type="submit">Send Request ?</button>
                <div id="form-status" style="margin-top: 1rem;"></div>
            </form>
        </div>
    </main>
    <footer>
        <p>© 2026 Nile Gazer — Full-Stack Development</p>
    </footer>
    <script>
        const form = document.getElementById('estimate-form');
        const statusDiv = document.getElementById('form-status');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            statusDiv.innerHTML = '<div class="status">Sending...</div>';
            const formData = new FormData(form);
            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                const result = await response.json();
                if (result.success) {
                    statusDiv.innerHTML = '<div class="status success">? Estimate request sent! I\'ll reply within 24 hours.</div>';
                    form.reset();
                } else {
                    throw new Error(result.message || 'Submission failed');
                }
            } catch (err) {
                statusDiv.innerHTML = '<div class="status error">? Error sending. Please email me directly at pounddase@gmail.com (replace with your real email).</div>';
            }
        });
    </script>
</body>
</html>
